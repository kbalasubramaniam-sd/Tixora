name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        dotnet-quality: preview
    - name: Restore dependencies
      run: dotnet restore src/Tixora.sln
    - name: Build
      run: dotnet build src/Tixora.sln --no-restore
    - name: Test
      run: |
        dotnet test tests/Tixora.Domain.Tests --no-build --verbosity normal
        dotnet test tests/Tixora.Application.Tests --no-build --verbosity normal
        dotnet test tests/Tixora.Infrastructure.Tests --no-build --verbosity normal
